<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Employee Exit<br>Management System</h1>

        <h2>Login</h2>

        <form method="POST" action="/login">

            <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

            <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

</body>

</html>
